<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Please Enter Your Details</h1>
    <form>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required="">
        <br>
    
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required="">
        <br>
    
        <fieldset>
          <legend>Select your interests:</legend>
          <input type="checkbox" id="interest1" name="interests1" value="coding">
          <label for="interest1">Coding</label>
    
          <input type="checkbox" id="interest2" name="interest2" value="design">
          <label for="interest2">Design</label>
    
          <input type="checkbox" id="interest3" name="interests3" value="gaming">
          <label for="interest3">Gaming</label>
        </fieldset>
        <br>
    
        <fieldset>
          <legend>Select your gender:</legend>
          <input type="radio" id="male" name="gender" value="male">
          <label for="male">Male</label>
    
          <input type="radio" id="female" name="gender" value="female">
          <label for="female">Female</label>
    
          <input type="radio" id="other" name="gender" value="other">
          <label for="other">Other</label>
        </fieldset>
        <br>

        <input type="submit" value="Submit">
      </form>

</body>
</html>
