<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex form</title>
</head>
<body>
    <h1>Please Enter your Details</h1>
    <form action="/submit" method="post" target="_blank">
      <fieldset>
        <legend>Personal Information</legend>
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" placeholder="John" required="">

        <br>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" placeholder="Doe" required="">

        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required="">

        <br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="25" min="18" max="99" required="">

        <br>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Interests</legend>
        <input type="checkbox" id="interest1" name="interests[]" value="music">
        <label for="interest1">Music</label>

        <input type="checkbox" id="interest2" name="interests[]" value="sports">
        <label for="interest2">Sports</label>

        <input type="checkbox" id="interest3" name="interests[]" value="reading">
        <label for="interest3">Reading</label>
      </fieldset>

      <fieldset>
        <legend>Location</legend>
        <label for="country">Country:</label>
        <select id="country" name="country">
          <optgroup label="North America">
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
          </optgroup>
          <optgroup label="Europe">
            <option value="uk">United Kingdom</option>
            <option value="germany">Germany</option>
          </optgroup>
        </select>

        <br>

        <label for="city">City:</label>
        <select id="city" name="city">
          <optgroup label="New York">
            <option value="nyc">New York City</option>
            <option value="buffalo">Buffalo</option>
          </optgroup>
          <optgroup label="Los Angeles">
            <option value="la">Los Angeles</option>
            <option value="sf">San Francisco</option>
          </optgroup>
        </select>
      </fieldset>

      <fieldset>
        <legend>Additional Information</legend>
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Your comments go here."></textarea>

        <br>

        <label for="profilePic">Profile Picture:</label>
        <input type="file" id="profilePic" name="profilePicture" accept=".jpg, .jpeg, .png" capture="camera">
      </fieldset>

      <fieldset>
        <legend>Submit Options</legend>
        <label for="preferredMethod">Preferred Submission Method:</label>
        <input type="radio" id="submitMethod1" name="submitMethod" value="online" checked="">
        <label for="submitMethod1">Online</label>

        <input type="radio" id="submitMethod2" name="submitMethod" value="offline">
        <label for="submitMethod2">Offline</label>

        <br>

        <label for="newsletter">Subscribe to Newsletter:</label>
        <input type="checkbox" id="newsletter" name="subscribeNewsletter" checked="">
      </fieldset>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  

</body>
</html>
